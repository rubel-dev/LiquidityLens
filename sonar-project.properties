sonar.projectKey=rubel-dev_LiquidityLens
sonar.projectName=LiquidityLens
sonar.projectVersion=0.2.0
sonar.sourceEncoding=UTF-8

# Governance-only mode scope. This is temporary until repository foundation scaffolds product code.
sonar.sources=docs,prompts,scripts,.github
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py
sonar.exclusions=**/.git/**,**/node_modules/**,**/.next/**,**/.venv/**,**/venv/**,**/__pycache__/**,**/dist/**,**/build/**,**/coverage/**,**/*.pdf

# Product-code mode transition target after backend/frontend scaffolding:
# sonar.sources=backend/app,frontend/src
# sonar.tests=backend/tests,frontend/src
# sonar.python.coverage.reportPaths=backend/coverage.xml
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
