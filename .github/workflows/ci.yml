name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  traceability:
    name: Traceability and governance validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate commit range traceability
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python scripts/validate_commit_traceability.py

      - name: Validate requirement IDs
        run: python scripts/validate_requirement_ids.py

      - name: Validate prompt records
        run: python scripts/validate_prompt_records.py

      - name: Run governance unit tests
        run: python -m unittest discover tests/governance

      - name: Check CI mode
        run: python scripts/check_ci_mode.py

  backend-quality:
    name: Backend quality
    runs-on: ubuntu-latest
    needs: traceability
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: liquiditylens_demo
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d liquiditylens_demo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Backend governance-only or mandatory product checks
        shell: bash
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/liquiditylens_demo
          DATABASE_SYNC_URL: postgresql+psycopg://postgres:postgres@localhost:5432/liquiditylens_demo
        run: |
          python scripts/check_ci_mode.py
          if [ -d backend ]; then
            python -m pip install --upgrade pip
            pip install -e "backend[dev]"
            python -m ruff format --check backend
            python -m ruff check backend
            python -m mypy backend/app
            cd backend
            python -m pytest
          else
            echo "Governance-only mode: backend source not scaffolded yet."
          fi

  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    needs: backend-quality
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Frontend governance-only or mandatory product checks
        shell: bash
        run: |
          python scripts/check_ci_mode.py
          if [ -d frontend ]; then
            npm --prefix frontend ci
            npm --prefix frontend run format:check
            npm --prefix frontend run lint
            npm --prefix frontend run typecheck
            npm --prefix frontend test
            npm --prefix frontend run build
          else
            echo "Governance-only mode: frontend source not scaffolded yet."
          fi

  test-and-coverage:
    name: Tests and coverage
    runs-on: ubuntu-latest
    needs: frontend-quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: liquiditylens_demo
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d liquiditylens_demo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Governance tests
        run: python -m unittest discover tests/governance
      - name: Product tests and coverage when scaffolded
        shell: bash
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/liquiditylens_demo
          DATABASE_SYNC_URL: postgresql+psycopg://postgres:postgres@localhost:5432/liquiditylens_demo
        run: |
          if [ -d backend ]; then
            python -m pip install --upgrade pip
            pip install -e "backend[dev]"
            cd backend
            python -m pytest
            cd ..
            test -f backend/coverage.xml
          else
            echo "Governance-only mode: no backend coverage report expected."
          fi
          if [ -d frontend ]; then
            npm --prefix frontend ci
            npm --prefix frontend test
            test -f frontend/coverage/lcov.info
            npm --prefix frontend run build
          else
            echo "Governance-only mode: no frontend coverage report expected."
          fi
      - name: Upload coverage artifacts when present
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            backend/coverage.xml
            frontend/coverage/lcov.info
          if-no-files-found: ignore

  sonarqube:
    name: SonarQube analysis
    runs-on: ubuntu-latest
    needs: test-and-coverage
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage
          path: .
        continue-on-error: true
      - name: Record SonarQube availability
        id: sonar-availability
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            {
              echo "### SonarQube: Configuration Error"
              echo "- Error summary: SONAR_TOKEN or SONAR_HOST_URL is not configured."
              echo "- Likely cause: repository secret setup, hosted tool availability, or integration configuration."
              echo "- Attempts made: coverage artifact download attempted; Sonar scan skipped because required secrets are unavailable."
              echo "- Known code-quality risk: remote static analysis and Quality Gate results are unavailable for this run."
              echo "- Local fallback checks: formatter, linter, type checker, unit tests, integration tests, coverage, governance validation, requirement-ID validation, prompt traceability."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "### SonarQube: Attempting Analysis" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: SonarQube scan
        if: steps.sonar-availability.outputs.available == 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: Record SonarQube fallback policy
        if: always()
        shell: bash
        run: |
          {
            echo "### SonarQube Best-Effort Policy"
            echo "- SonarQube result states: Passed, Failed, Skipped, Unavailable, Configuration Error."
            echo "- SonarQube failures and Quality Gate failures are recorded honestly but do not block implementation, commits, merging, or demo preparation."
            echo "- Prompt-to-commit traceability and local quality gates remain mandatory."
          } >> "$GITHUB_STEP_SUMMARY"

  quality-gate:
    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    needs: sonarqube
    if: always()
    continue-on-error: true
    steps:
      - name: Record Quality Gate availability
        id: gate-availability
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            {
              echo "### SonarQube Quality Gate: Configuration Error"
              echo "- Error summary: Quality Gate cannot run without SONAR_TOKEN and SONAR_HOST_URL."
              echo "- Likely cause: repository secret setup, hosted tool availability, or integration configuration."
              echo "- Attempts made: SonarQube analysis job completed best-effort before this gate."
              echo "- Known code-quality risk: Quality Gate status is unavailable for this run."
              echo "- Local fallback checks: formatter, linter, type checker, unit tests, integration tests, coverage, security/safety governance validation."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Wait for Quality Gate
        if: steps.gate-availability.outputs.available == 'true'
        uses: SonarSource/sonarqube-quality-gate-action@v1
        continue-on-error: true
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: Record Quality Gate best-effort result
        if: always()
        shell: bash
        run: |
          {
            echo "### Quality Gate Best-Effort Policy"
            echo "- A failed, skipped, unavailable, or configuration-error Quality Gate does not block implementation, commits, merging, or demo preparation."
            echo "- Never claim Quality Gate passed unless the remote action actually reports a pass."
          } >> "$GITHUB_STEP_SUMMARY"
