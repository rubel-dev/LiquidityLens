name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  traceability:
    name: Traceability and governance validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate commit range traceability
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python scripts/validate_commit_traceability.py

      - name: Validate requirement IDs
        run: python scripts/validate_requirement_ids.py

      - name: Validate prompt records
        run: python scripts/validate_prompt_records.py

      - name: Run governance unit tests
        run: python -m unittest discover tests/governance

      - name: Check CI mode
        run: python scripts/check_ci_mode.py

  backend-quality:
    name: Backend quality
    runs-on: ubuntu-latest
    needs: traceability
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Backend governance-only or mandatory product checks
        shell: bash
        run: |
          python scripts/check_ci_mode.py
          if [ -d backend ]; then
            python -m pip install --upgrade pip
            pip install -e "backend[dev]"
            python -m ruff format --check backend
            python -m ruff check backend
            python -m mypy backend/app
            cd backend
            python -m pytest
          else
            echo "Governance-only mode: backend source not scaffolded yet."
          fi

  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    needs: backend-quality
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Frontend governance-only or mandatory product checks
        shell: bash
        run: |
          python scripts/check_ci_mode.py
          if [ -d frontend ]; then
            npm --prefix frontend ci
            npm --prefix frontend run format:check
            npm --prefix frontend run lint
            npm --prefix frontend run typecheck
            npm --prefix frontend test
            npm --prefix frontend run build
          else
            echo "Governance-only mode: frontend source not scaffolded yet."
          fi

  test-and-coverage:
    name: Tests and coverage
    runs-on: ubuntu-latest
    needs: frontend-quality
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Governance tests
        run: python -m unittest discover tests/governance
      - name: Product tests and coverage when scaffolded
        shell: bash
        run: |
          if [ -d backend ]; then
            python -m pip install --upgrade pip
            pip install -e "backend[dev]"
            cd backend
            python -m pytest
            cd ..
            test -f backend/coverage.xml
          else
            echo "Governance-only mode: no backend coverage report expected."
          fi
          if [ -d frontend ]; then
            npm --prefix frontend ci
            npm --prefix frontend test
            test -f frontend/coverage/lcov.info
            npm --prefix frontend run build
          else
            echo "Governance-only mode: no frontend coverage report expected."
          fi
      - name: Upload coverage artifacts when present
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            backend/coverage.xml
            frontend/coverage/lcov.info
          if-no-files-found: ignore

  sonarqube:
    name: SonarQube analysis
    runs-on: ubuntu-latest
    needs: test-and-coverage
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage
          path: .
        continue-on-error: true
      - name: Validate required SonarQube secrets
        shell: bash
        run: |
          test -n "${{ secrets.SONAR_TOKEN }}"
          test -n "${{ secrets.SONAR_HOST_URL }}"
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  quality-gate:
    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - name: Wait for Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
