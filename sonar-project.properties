sonar.projectKey=rubel-dev_LiquidityLens
sonar.organization=rubel-dev
sonar.projectName=LiquidityLens
sonar.projectVersion=0.2.0
sonar.sourceEncoding=UTF-8

sonar.sources=backend/app,frontend/src,docs,prompts,scripts,.github
sonar.tests=backend/tests,frontend/src,tests
sonar.test.inclusions=backend/tests/**/*.py,frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx,tests/**/*.py
sonar.exclusions=**/.git/**,**/node_modules/**,**/.next/**,**/.venv/**,**/venv/**,**/__pycache__/**,**/dist/**,**/build/**,**/coverage/**,**/*.pdf

sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
