name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Governance, docs, and placeholder stack validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install backend dependencies when present
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/pyproject.toml ]; then pip install -e backend; fi
          if [ ! -d backend ]; then echo "No backend source yet; placeholder validation continues."; fi

      - name: Install frontend dependencies when present
        shell: bash
        run: |
          if [ -f frontend/package-lock.json ]; then npm --prefix frontend ci; else echo "No frontend lockfile yet."; fi

      - name: Format check placeholder
        shell: bash
        run: |
          if [ -f frontend/package.json ]; then npm --prefix frontend run format:check --if-present; fi
          echo "Backend format check becomes mandatory when backend tooling is scaffolded."

      - name: Lint placeholder
        shell: bash
        run: |
          if [ -f frontend/package.json ]; then npm --prefix frontend run lint --if-present; fi
          echo "Backend lint becomes mandatory when backend tooling is scaffolded."

      - name: Type check placeholder
        shell: bash
        run: |
          if [ -f frontend/package.json ]; then npm --prefix frontend run typecheck --if-present; fi
          echo "Python type check becomes mandatory when backend tooling is scaffolded."

      - name: Unit tests placeholder
        shell: bash
        run: |
          if [ -d backend/tests ]; then pytest backend/tests --cov=backend --cov-report=xml:backend/coverage.xml; else echo "No backend unit tests yet."; fi
          if [ -f frontend/package.json ]; then npm --prefix frontend run test:unit --if-present; fi

      - name: Integration tests placeholder
        shell: bash
        run: |
          if [ -d tests/integration ]; then pytest tests/integration; else echo "No integration tests yet."; fi

      - name: Build placeholder
        shell: bash
        run: |
          if [ -f frontend/package.json ]; then npm --prefix frontend run build --if-present; fi
          echo "No product build required until source directories exist."

      - name: Prompt traceability check
        shell: bash
        run: |
          msg="$(git log -1 --pretty=%B)"
          echo "$msg" | grep -Eq '^Requirement-IDs: .+'
          echo "$msg" | grep -Eq '^Prompt-ID: PROMPT-[0-9]{4}'
          echo "$msg" | grep -Eq '^Module: .+'
          echo "$msg" | grep -Eq '^Tests: .+'
          prompt_id="$(echo "$msg" | sed -n 's/^Prompt-ID: \(PROMPT-[0-9][0-9][0-9][0-9]\).*/\1/p' | head -n 1)"
          test -n "$prompt_id"
          ls prompts/history/${prompt_id}-*.md >/dev/null

      - name: Documentation safety checks
        shell: bash
        run: |
          test -f README.md
          test -f docs/11-requirement-traceability.md
          test -f sonar-project.properties
          ! grep -RInE "c[o]nfirmed wrongdoing|p[e]rform wallet transfer|fr[e]eze funds now|bl[o]ck account now|s[e]ttle real wallet|pr[o]duction wallet secret|No fr[a]ud indicators|Arrange 20[,]000 taka" docs README.md prompts


